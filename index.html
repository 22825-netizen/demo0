<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติส่วนตัว | มิวสิค เจตพล</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #e74c3c; /* สีแดงที่มิวสิคชอบ */
            --primary-dark: #c0392b;
            --bg-color: #f8f9fa;
            --text-color: #2c3e50;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: var(--card-bg);
            max-width: 450px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.15);
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* ส่วนหัวสีแดง */
        .card-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            height: 140px;
            position: relative;
            display: flex;
            justify-content: center;
        }

        /* รูปโปรไฟล์วงกลม */
        .avatar-container {
            position: absolute;
            bottom: -50px;
            background: white;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 4px solid white;
        }

        .avatar-placeholder {
            background: #f1f2f6;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary-color);
            font-size: 2.5rem;
        }

        /* เนื้อหาด้านใน */
        .card-body {
            padding: 70px 30px 40px 30px;
            text-align: center;
        }

        .name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .nickname {
            font-size: 1.1rem;
            color: var(--primary-color);
            font-weight: 600;
            background: #fdedec;
            padding: 4px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 30px;
        }

        /* รายละเอียดข้อมูล */
        .info-list {
            text-align: left;
            margin-top: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 12px;
            background: #fdfdfd;
            border: 1px solid #f1f2f6;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .info-item:hover {
            background: #fff5f5;
            border-color: #fbc4c4;
        }

        .info-item i {
            font-size: 1.3rem;
            width: 35px;
            color: var(--primary-color);
            text-align: center;
            margin-right: 15px;
        }

        .info-label {
            font-weight: 600;
            color: #7f8c8d;
            font-size: 0.9rem;
            display: block;
            line-height: 1.2;
        }

        .info-value {
            color: #2c3e50;
            font-size: 1.05rem;
            font-weight: 400;
        }

        /* ตกแต่งแท็กสีที่ชอบเป็นพิเศษ */
        .color-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .color-dot {
            width: 12px;
            height: 12px;
            background-color: var(--primary-color);
            border-radius: 50%;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="card-header">
            <div class="avatar-container">
                <div class="avatar-placeholder">
                    <i class="fa-solid fa-user-astronaut"></i>
                </div>
            </div>
        </div>

        <div class="card-body">
            <h1 class="name">เจตพล อินจจุ่มใจ๋</h1>
            <span class="nickname"><i class="fa-solid fa-music"></i> พี่มิวสิค</span>

            <div class="info-list">
                <div class="info-item">
                    <i class="fa-solid fa-cake-candles"></i>
                    <div>
                        <span class="info-label">วันเกิด</span>
                        <span class="info-value">9 มกราคม 2555</span>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-laptop-code"></i>
                    <div>
                        <span class="info-label">วิชาที่ชอบ</span>
                        <span class="info-value">คอมพิวเตอร์ 💻</span>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-utensils"></i>
                    <div>
                        <span class="info-label">อาหารที่ชอบ</span>
                        <span class="info-value">ผัดกะเพรา 🍳</span>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fa-solid fa-palette"></i>
                    <div>
                        <span class="info-label">สีที่ชอบ</span>
                        <span class="info-value color-badge">
                            <span class="color-dot"></span>สีแดง (Red)
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
